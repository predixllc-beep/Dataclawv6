version: '3.8'

services:
  agent_core:
    build: .
    restart: unless-stopped
    volumes:
      - ./dataclaw_core:/opt/dataclaw/core
      - ./plugins:/opt/dataclaw/plugins
      - ./logs:/opt/dataclaw/logs
    environment:
      - ENV=production
    depends_on:
      - vector_db
      - model_router

  model_router:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"

  vector_db:
    image: chromadb/chroma:latest
    restart: unless-stopped
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8000:8000"

  monitoring:
    build: 
      context: .
      dockerfile: Dockerfile.monitor
    restart: unless-stopped
    volumes:
      - ./logs:/opt/dataclaw/logs
    depends_on:
      - agent_core

volumes:
  ollama_data:
  chroma_data:
